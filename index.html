<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Check - Koyangi 🐈‍⬛</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--pk: #ff3333; --pk2: #ff8080; --pk3: #b30000;
--bg: #050505; --bg2: #0f0a0a; --bg3: #1a0505;
--txt2: rgba(255,255,255,0.7); --txt3: rgba(255,255,255,0.42);
}
html { scroll-behavior: smooth; }
body { font-family: 'Kanit', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

/* Particles Background */
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; }
@keyframes ptUp { 
    0% { transform: translateY(105vh); opacity: 0; } 
    8% { opacity: 0.45; } 92% { opacity: 0.45; } 
    100% { transform: translateY(-8vh) rotate(360deg); opacity: 0; } 
}

/* UI Elements */
.topbar { position: sticky; top: 0; z-index: 100; background: #0a0000; border-bottom: 2px solid var(--pk3); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; box-shadow: 0 2px 20px rgba(179,0,0,0.3); }
.topbar-brand { font-family: 'Mitr', sans-serif; font-size: 20px; font-weight: 700; color: #ffffff; text-shadow: 0 0 16px rgba(255,51,51,0.7); }
.topbar-brand span { color: var(--pk); }
.tb-link { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; text-decoration: none; color: #fff; border: 1px solid var(--pk); background: rgba(255,51,51,0.1); transition: all .2s; }
.tb-link:hover { background: var(--pk); box-shadow: 0 0 15px rgba(255,51,51,0.5); }

.hero { background: linear-gradient(135deg, #0a0000 0%, #330000 35%, #800000 70%, #ff0000 100%); padding: 60px 32px 50px; text-align: center; position: relative; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 42px; font-weight: 700; background: linear-gradient(to bottom, #fff, var(--pk2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,51,51,0.5)); }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 10px; letter-spacing: 1px; }

/* Search & Date Filter */
.search-container { max-width: 550px; margin: -30px auto 30px; padding: 0 20px; position: relative; z-index: 10; }
.search-input { width: 100%; padding: 18px 25px; border-radius: 35px; border: 2px solid var(--pk3); background: #0f0a0a; color: #fff; font-family: 'Kanit'; font-size: 16px; outline: none; box-shadow: 0 15px 30px rgba(0,0,0,0.6); transition: 0.3s; }
.date-filter-box { margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,51,51,0.05); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,51,51,0.1); }
.date-filter-input { background: transparent; border: none; color: var(--pk2); font-family: 'Kanit'; outline: none; cursor: pointer; }

/* Table Section */
.content { max-width: 950px; margin: 0 auto; padding: 20px 25px 120px; position: relative; z-index: 1; }
.q-card { background: linear-gradient(180deg, #0f0a0a 0%, #050505 100%); border: 1px solid rgba(255,51,51,0.2); border-radius: 18px; overflow-x: auto; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
.q-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.q-table th { background: rgba(255,51,51,0.15); color: var(--pk2); text-align: left; padding: 18px; font-size: 14px; border-bottom: 2px solid var(--pk3); }
.q-table td { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13.5px; }

.stt { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; display: inline-block; cursor: pointer; white-space: nowrap; }
.stt-waiting { background: rgba(241, 196, 15, 0.1); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.3); }
.stt-process { background: rgba(52, 152, 219, 0.1); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
.stt-done { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #0a0000; border-top: 2px solid var(--pk3); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
.nav-item { display: flex; flex-direction: column; align-items: center; color: var(--txt3); text-decoration: none; font-size: 11px; cursor: pointer; }
.nav-add { width: 55px; height: 55px; background: linear-gradient(135deg, var(--pk), var(--pk3)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -35px; border: 4px solid var(--bg); color: white; font-size: 24px; transition: 0.3s; }

/* Modal */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.modal.open { display: flex; }
.modal-content { background: #0f0a0a; width: 100%; max-width: 400px; border: 1px solid var(--pk); border-radius: 20px; padding: 25px; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 13px; color: var(--txt2); margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #330000; background: #050505; color: white; outline: none; font-family: 'Kanit'; }
.btn-submit { width: 100%; padding: 12px; background: var(--pk); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-family: 'Kanit'; }

input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
</style>
</head>
<body>

<div id="pts"></div>

<div class="topbar">
    <div class="topbar-brand">koyang<span>i</span>.queue</div>
    <a href="https://lin.ee/UUfn5xL" target="_blank" class="tb-link">💚 ติดต่อแอดมิน</a>
</div>

<div class="hero">
    <h1 class="hero-title">เช็คคิวงาน 🐾</h1>
    <p class="hero-sub">✦ ข้อมูลบันทึกแยกตามเบราว์เซอร์ของแต่ละเครื่อง ✦</p>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นชื่อลูกค้า..." onkeyup="filterQueue()">
    
    <div class="date-filter-box">
        <span style="font-size: 12px; color: var(--txt2);">📅 ดูตามวัน:</span>
        <input type="date" id="dateFilter" class="date-filter-input" onchange="filterQueue()">
        <button onclick="clearDateFilter()" style="background:none; border:none; color:var(--txt3); cursor:pointer; font-size:11px;">[ดูทั้งหมด]</button>
    </div>
</div>

<div class="content">
    <div class="q-card">
        <table class="q-table" id="queueTable">
            <thead>
                <tr>
                    <th style="width: 10%;">คิว</th>
                    <th style="width: 25%;">ชื่อลูกค้า</th>
                    <th style="width: 25%;">ประเภทงาน</th>
                    <th style="width: 20%;">วันที่</th>
                    <th style="width: 20%;">สถานะ</th>
                </tr>
            </thead>
            <tbody id="queueBody">
                </tbody>
        </table>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <span>🏠</span><span>หน้าหลัก</span>
    </div>
    <div class="nav-add" onclick="toggleModal()"><span>+</span></div>
    <div class="nav-item" onclick="resetAll()">
        <span>🗑️</span><span>ล้างข้อมูล</span>
    </div>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>เพิ่มคิวงานใหม่ 🐾</h3>
        <div class="form-group">
            <label>วันที่รับงาน</label>
            <input type="date" id="jobDate">
        </div>
        <div class="form-group">
            <label>ชื่อลูกค้า (Facebook/Line)</label>
            <input type="text" id="custName" placeholder="ระบุชื่อลูกค้า">
        </div>
        <div class="form-group">
            <label>ประเภทงาน</label>
            <select id="jobType">
                <option value="เว็บไบโอพรีเมียม">เว็บไบโอพรีเมียม</option>
                <option value="เว็บรับเติมเกม">เว็บรับเติมเกม</option>
                <option value="ป้ายร้านค้า">ป้ายร้านค้า</option>
                <option value="โลโก้ / ลายน้ำ">โลโก้ / ลายน้ำ</option>
            </select>
        </div>
        <button class="btn-submit" onclick="addQueue()">บันทึกคิวงาน</button>
        <button style="background:transparent; color:gray; border:none; width:100%; margin-top:10px; cursor:pointer;" onclick="toggleModal()">ยกเลิก</button>
    </div>
</div>

<script>
// --- ส่วนการจัดการข้อมูล (Data Management) ---

let queues = JSON.parse(localStorage.getItem('koyangi_data')) || [];

function renderTable() {
    const body = document.getElementById('queueBody');
    body.innerHTML = '';
    
    queues.forEach((q, index) => {
        const row = document.createElement('tr');
        // เพิ่ม attribute สำหรับการกรอง
        row.setAttribute('data-date', q.rawDate);
        row.setAttribute('data-name', q.name.toUpperCase());

        let statusHTML = '';
        if(q.status === 'done') statusHTML = `<span class="stt stt-done" onclick="changeStatus(${index})">✅ สำเร็จแล้ว</span>`;
        else if(q.status === 'process') statusHTML = `<span class="stt stt-process" onclick="changeStatus(${index})">⚡ ดำเนินการ</span>`;
        else statusHTML = `<span class="stt stt-waiting" onclick="changeStatus(${index})">⏳ รอคิว</span>`;

        row.innerHTML = `
            <td>${q.id}</td>
            <td>${q.name}</td>
            <td>${q.type}</td>
            <td>${q.displayDate}</td>
            <td>${statusHTML}</td>
        `;
        body.appendChild(row);
    });
    
    localStorage.setItem('koyangi_data', JSON.stringify(queues));
    filterQueue(); // กรองทันทีหลังวาดตาราง
}

function addQueue() {
    const rawDate = document.getElementById('jobDate').value;
    const name = document.getElementById('custName').value;
    const type = document.getElementById('jobType').value;

    if(!name || !rawDate) return alert("กรุณากรอกข้อมูลให้ครบถ้วนนะคะ");

    // แปลงวันที่โชว์ dd/mm/yyyy
    const dateParts = rawDate.split('-');
    const displayDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

    const newQueue = {
        id: "#" + (queues.length + 1).toString().padStart(3, '0'),
        name: name,
        type: type,
        rawDate: rawDate,
        displayDate: displayDate,
        status: 'waiting'
    };

    queues.push(newQueue);
    document.getElementById('custName').value = '';
    toggleModal();
    renderTable();
}

function changeStatus(index) {
    const states = ['waiting', 'process', 'done'];
    let current = states.indexOf(queues[index].status);
    queues[index].status = states[(current + 1) % states.length];
    renderTable();
}

function filterQueue() {
    const nameInput = document.getElementById("searchInput").value.toUpperCase();
    const dateInput = document.getElementById("dateFilter").value;
    const rows = document.querySelectorAll("#queueBody tr");

    rows.forEach(row => {
        const rowName = row.getAttribute('data-name');
        const rowDate = row.getAttribute('data-date');

        const matchName = rowName.includes(nameInput);
        const matchDate = !dateInput || rowDate === dateInput;

        if(matchName && matchDate) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}

function clearDateFilter() {
    document.getElementById("dateFilter").value = "";
    filterQueue();
}

function resetAll() {
    if(confirm("ยืนยันการล้างข้อมูลทั้งหมดในเครื่องนี้?")) {
        queues = [];
        renderTable();
    }
}

function toggleModal() {
    document.getElementById('addModal').classList.toggle('open');
}

// --- เริ่มต้นระบบ ---
window.onload = () => {
    // เซตค่าปฏิทินใน Modal เป็นวันปัจจุบัน
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('jobDate').value = today;
    
    renderTable();
};

// Particles (คงเดิม)
const P = document.getElementById('pts');
const symbols = ['✦', '🐾', '🐈‍⬛'];
symbols.forEach(e => {
    for (let j = 0; j < 5; j++) {
        const d = document.createElement('div');
        d.className = 'pt';
        d.textContent = e;
        d.style.cssText = `left:${Math.random()*100}vw; font-size:${10+Math.random()*10}px; color:#ff3333; animation-duration:${10+Math.random()*15}s; animation-delay:${-Math.random()*20}s;`;
        P.appendChild(d);
    }
});
</script>
</body>
</html>
